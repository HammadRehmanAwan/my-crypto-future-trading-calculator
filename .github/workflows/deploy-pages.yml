name: Deploy site to GitHub Pages

# Deploys the static frontend straight from `main`. Only the frontend files
# are staged into _site (backend.py / app.py / configs are never published),
# so there is no more manual mirror to the gh-pages branch.

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "app.js"
      - "style.css"
      - "favicon.svg"
      - "privacy.html"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Stage frontend into _site
        run: |
          mkdir -p _site
          for f in index.html app.js style.css favicon.svg privacy.html; do
            if [ -f "$f" ]; then cp "$f" _site/; echo "staged $f"; fi
          done
          echo "--- _site contents ---"
          ls -la _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
