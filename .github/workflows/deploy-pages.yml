name: Deploy Frontend to GitHub Pages

# Deploys the static frontend straight from `main`. Only the frontend files
# in the frontend/ directory are deployed (backend.py / app.py / configs are
# never published), so there is no more manual mirror to the gh-pages branch.

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/index.html"
      - "frontend/app.js"
      - "frontend/style.css"
      - "frontend/favicon.svg"
      - "frontend/privacy.html"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload frontend as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
