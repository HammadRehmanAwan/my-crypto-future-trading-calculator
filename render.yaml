services:
  - type: web
    name: futurex-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install fastapi uvicorn
    startCommand: uvicorn backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
